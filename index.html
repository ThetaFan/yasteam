  <script>
    function getParamValue(key) {
      const params = new URLSearchParams(window.location.search);
      return params.get(key);
    }

    async function checkGeolocation() {
      try {
        const response = await fetch('https://ipinfo.io/country');
        const countryCode = await response.text();
        return countryCode.trim() === 'RU';
      } catch (error) {
        console.error('Geolocation check failed:', error);
        return false;
      }
    }

    async function checkImage(url) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
      });
    }

    async function getLogoUrlFromSteamAPI(logoId) {
      if (!logoId || isNaN(logoId)) return null;
      
      try {
        const apiUrl = `https://store.steampowered.com/api/appdetails?appids=${logoId}&l=english`;
        const response = await fetch(apiUrl);
        
        if (!response.ok) {
          console.warn(`Steam API responded with status: ${response.status}`);
          return null;
        }
        
        const data = await response.json();
        const appData = data[logoId];
        
        if (appData && appData.success && appData.data && appData.data.header_image) {
          // Убираем экранирование слешей
          const headerImageUrl = appData.data.header_image.replace(/\\\//g, '/');
          
          // Проверяем, что изображение действительно доступно
          const isImageAvailable = await checkImage(headerImageUrl);
          if (isImageAvailable) {
            return headerImageUrl;
          }
        }
        
        return null;
      } catch (error) {
        console.error('Error fetching from Steam API:', error);
        return null;
      }
    }
    
    function showBonusMessageYellow() {
      // Проверяем, есть ли уже бонусное сообщение
      if (!document.querySelector('.bonus-message-yellow')) {
        const bonusDiv = document.createElement('div');
        bonusDiv.className = 'bonus-message-yellow';
        const bonusLink = "https://yandex.ru/project/browser/bonus/multioffer/affiliate_4prod?source=pWRP8eS1VsC2X59560&partner_string=P89XvN11U6RuE47077&cliddbro=14080813&clidmbro=14080806&cliddefault=14080820&clidpp=14185506";
        bonusDiv.innerHTML = `✨ <a href="${bonusLink}" target="_blank" rel="noopener noreferrer">БОНУС: Установи Я.Браузер сегодня и получи до 800 рублей на телефон!</a> ⭐`;
        return bonusDiv;
      }
      return null;
    }

    async function renderContent() {
      const logo = getParamValue("logo");
      const id1 = getParamValue("id1");
      const id2 = getParamValue("id2");
      const id3 = getParamValue("id3");
      const id4 = getParamValue("id4");

      const userAgent = navigator.userAgent.toLowerCase();
      const isYandex = userAgent.includes("yabrowser");
      const isRussia = await checkGeolocation();

      const logoContainer = document.createElement('div');
      logoContainer.className = 'logo-container';

      // Получаем логотип через Steam API
      if (logo && !isNaN(logo)) {
        const logoUrl = await getLogoUrlFromSteamAPI(logo);
        if (logoUrl) {
          logoContainer.innerHTML = `<img src="${logoUrl}" alt="Game logo">`;
        } else {
          console.log('Логотип не найден для ID:', logo);
          // Можно добавить заглушку или ничего не выводить
        }
      }

      let htmlBelowLogo = "";

      if (isRussia && !isYandex) {
        // Показываем сообщение о скачивании
        htmlBelowLogo += `
          <div class="info-message">
            <span class="bold-text">Скачивание началось!</span>
            После установки откройте эту страницу в <span class="highlight">Я.Браузере</span> и получите ссылки на игру
          </div>
        `;
        
        logoContainer.innerHTML += htmlBelowLogo;
        
        // Добавляем бонусное сообщение
        const bonusMessage = showBonusMessageYellow();
        if (bonusMessage) {
          logoContainer.appendChild(bonusMessage);
        }
        
        document.body.appendChild(logoContainer);
        
        // Через небольшую задержку начинаем скачивание
        setTimeout(() => {
          window.location.href = "https://redirect.appmetrica.yandex.com/serve/1038439893707027542?partner_id=831050&appmetrica_js_redirect=0&full=0&clid=13076761&banerid=1313076760";
        }, 2000);
        
      } else {
        // Показываем ссылки для скачивания
        let links = "";
        if (id1) links += `<p><a href="https://pixeldrain.com/u/${id1}" target="_blank" class="link-pixeldrain">Скачать с PIXELDRAIN</a></p>`;
        if (id2) links += `<p><a href="https://www.mediafire.com/file/${id2}" target="_blank" class="link-mediafire">Скачать с MEDIAFIRE</a></p>`;
        if (id3) links += `<p><a href="https://gofile.io/d/${id3}" target="_blank" class="link-gofile">Скачать с GOFILE</a></p>`;
        if (id4) links += `<p><a href="https://ranoz.gg/file/${id4}" target="_blank" class="link-ranoz">Скачать с RANOZ</a></p>`;
        if (!id1 && !id2 && !id3 && !id4) links += `<p>Ссылки для скачивания не найдены.</p>`;

        htmlBelowLogo += links;
        logoContainer.innerHTML += htmlBelowLogo;
        
        // Добавляем бонусное сообщение для пользователей в России с Яндекс.Браузером
        if (isRussia && isYandex) {
          const bonusMessage = showBonusMessageYellow();
          if (bonusMessage) {
            logoContainer.appendChild(bonusMessage);
          }
        }
        
        document.body.appendChild(logoContainer);
      }
    }

    window.onload = renderContent;
